name: Build private n8n (de-telemetry + Community Plus)

# 自用构建流水线:
#   - 手动触发, 可指定 n8n 标签版本, 留空则自动取最新稳定版 (n8n@X.Y.Z 中的最大语义版本);
#   - 拉取源码 -> 应用 n8n-privacy-patch.py -> pnpm 构建 -> 打成 docker 镜像 -> 上传为产物供下载;
#   - 带 pnpm store / turbo / docker layer 三级缓存, 用 restore-keys 模糊匹配尽量跨版本复用。
#
# 约定: 把 n8n-privacy-patch.py 放在本仓库根目录 (与本 workflow 同仓库)。

on:
  workflow_dispatch:
    inputs:
      version:
        description: "n8n 标签 (如 2.25.7 或 n8n@2.25.7); 留空 = 自动取最新稳定版"
        required: false
        default: ""
      strip_deps:
        description: "物理移除遥测 SDK 依赖与引用 (--strip-deps); 关闭则仅中和"
        type: boolean
        default: true
      no_cache:
        description: "禁用缓存 (排障用)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-private-n8n-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.16.0"
  PNPM_VERSION: "10.32.1"
  # ── 构建期遥测 / 通知 / 非必要下载 统一关闭 ──
  CI: "true"                              # 让脚本走 CI 分支 (prepare.mjs 跳过 lefthook 等)
  TURBO_TELEMETRY_DISABLED: "1"           # Turborepo 匿名使用遥测 (就是那条 Attention 提示)
  DO_NOT_TRACK: "1"                       # 行业通用 opt-out, Turbo 等多种工具识别
  NEXT_TELEMETRY_DISABLED: "1"            # 兜底 (本仓库非 Next.js, 无害)
  NO_UPDATE_NOTIFIER: "1"                 # 禁用 update-notifier 类 "有新版" 提示
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"    # corepack 拉包管理器时不交互提示
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"   # 不下载 playwright 浏览器二进制
  PUPPETEER_SKIP_DOWNLOAD: "1"            # 不下载 puppeteer chromium
  # 注意: 不设置 SENTRY_AUTH_TOKEN => @sentry/vite-plugin 不上传 sourcemap
  #       (该插件在 n8n 里已配置 telemetry:false, 且无 token 时直接跳过上传)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      # 1) 取出本仓库 (含 patch 脚本) 到 tooling/
      - name: Checkout tooling (patch script)
        uses: actions/checkout@v4
        with:
          path: tooling

      # 2) 解析目标 ref:
      #    - 指定了 version -> n8n@<version>
      #    - 留空 -> GitHub "Latest" release (API 自动排除 pre-release/draft);
      #             取不到则回退 n8n 官方稳定指针 tag `stable`
      #    (不再用 "最大语义 tag", 否则会误选 2.26.x 这类 pre-release)
      - name: Resolve target ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            case "$INPUT" in
              n8n@*) REF="$INPUT" ;;
              *)     REF="n8n@${INPUT#v}" ;;
            esac
          else
            REF=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  https://api.github.com/repos/n8n-io/n8n/releases/latest 2>/dev/null \
                  | grep -oE '"tag_name"[[:space:]]*:[[:space:]]*"[^"]+"' \
                  | grep -oE 'n8n@[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -z "$REF" ]; then
              echo "::warning::releases/latest 解析失败, 回退到 stable tag"
              REF="stable"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "::notice::目标 ref = $REF"

      # 3) 浅克隆 n8n 指定 ref
      - name: Clone n8n @ ${{ steps.resolve.outputs.ref }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ steps.resolve.outputs.ref }}" \
            https://github.com/n8n-io/n8n.git n8n

      # 3b) 从源码读真实版本号 (stable/latest 是浮动指针, 需读 package.json)
      - name: Read resolved version
        id: ver
        run: |
          set -euo pipefail
          V=$(grep -m1 '"version"' n8n/package.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ -n "$V" ] || { echo "::error::读取版本失败"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "::notice::解析到版本 $V"

      # 4) 应用隐私 patch (去遥测 + License 内联 Community Plus + 去邮箱)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply privacy patch
        run: |
          set -euo pipefail
          STRIP=""
          if [ "${{ inputs.strip_deps }}" = "true" ]; then STRIP="--strip-deps"; fi
          python3 tooling/n8n-privacy-patch.py n8n $STRIP --verify --no-backup

      # 5) 工具链
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 6) 缓存: pnpm store (内容寻址, 跨版本复用率高)
      - name: Get pnpm store path
        id: pnpm
        working-directory: n8n
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        if: ${{ !inputs.no_cache }}
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ steps.ver.outputs.version }}-${{ hashFiles('n8n/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ steps.ver.outputs.version }}-
            pnpm-${{ runner.os }}-

      # 7) 缓存: turbo 构建产物 (跨版本复用, 仅命中未变的包)
      - name: Cache turbo
        if: ${{ !inputs.no_cache }}
        uses: actions/cache@v4
        with:
          path: n8n/.turbo
          key: turbo-${{ runner.os }}-${{ steps.ver.outputs.version }}-${{ github.run_id }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ steps.ver.outputs.version }}-
            turbo-${{ runner.os }}-

      # 8) 安装 (改了 package.json, 必须 --no-frozen-lockfile 以更新 lockfile;
      #    随后 build-n8n.mjs 内部的 --frozen-lockfile 校验即可通过)
      - name: pnpm install
        working-directory: n8n
        run: pnpm install --no-frozen-lockfile

      # 9) 构建 + 生成 compiled 部署目录 (官方脚本)
      - name: Build n8n
        working-directory: n8n
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: pnpm build:n8n

      # 10) docker buildx + GHA layer 缓存 (跨版本复用 base/系统层)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: n8n
          file: n8n/docker/images/n8n/Dockerfile
          build-args: |
            N8N_VERSION=${{ steps.ver.outputs.version }}
            N8N_RELEASE_TYPE=stable
          tags: n8n-private:${{ steps.ver.outputs.version }}
          load: true
          cache-from: type=gha,scope=n8n-image
          cache-to: type=gha,mode=max,scope=n8n-image

      # 11) 导出镜像为压缩 tar 并上传为产物
      - name: Export image
        run: |
          set -euo pipefail
          OUT="n8n-private-${{ steps.ver.outputs.version }}.tar"
          docker save "n8n-private:${{ steps.ver.outputs.version }}" -o "$OUT"
          gzip -9 "$OUT"
          ls -lh "${OUT}.gz"
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: n8n-private-${{ steps.ver.outputs.version }}
          path: n8n-private-${{ steps.ver.outputs.version }}.tar.gz
          retention-days: 14
          compression-level: 0  # 已 gzip, 不重复压缩
